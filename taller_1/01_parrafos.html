<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Párrafos y encabezados</title>
</head>
<body>
    <!-- Titulos o Encabezados :
     Se tienen 6 tios de encabezados, desde el h1 hasta el h6.-->
     <!--(h$*6) Crea 6 titulos en orden del 1 al 6 Emmet-->
    <h1>Titulo</h1>
    <!--El h1 se utiliza una sola vez por pagina web wsto es debido a que el h1 tiee una importancia en el CEEO llo que es el posicionamiento Web, es decir, google le da mucha impoetancia al h1-->
    <h2>Subtitulo</h2>
    <h3>Subtitulo</h3>
    <h4>Subtitulo</h4>
    <h5>Subtitulo</h5>
    <h6>Subtitulo</h6>
    <!-- Desde el h2 hasta el h6, se puede utilizar las veces sean necesarias segun el contenido que se quiera recrear.-->

    <!-- Parrafo: Los parrafos deben tener una idea o punto especifico.
     Cada parrafo escrito debe de contener un concepto, una idea. Es decir, puede describir una seccion o un elemento, hasta un mensaje en el chat. Por ejemplo en una seccion se habla sobre los beneficios del ejercicio:
     Un parrafo puede tratar de mejorar la salud cardivascular y otro puede ser sobre los beneficios y cuidados de la salud mental. Finalmnete, debe existir un motivo para que exista un parrafo.-->
     <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Ut placeat repellat dolores accusamus. Dolor, qui porro. Aut ratione voluptatem quidem obcaecati nulla deleniti, impedit architecto ipsum commodi dolores. Explicabo, perferendis?

     </p>
     <!-- (CTRL+SHIFT+P) o (ALT+Z) Ajusta el contenido del párrafo a la ventana del editor-->
      <!-- Existen algunas tecnologias de asistencia como lectores de pantalla, que ayudan a las ersonas con dispacidad visual a navegar por contenido web.
       Por ejemplo: cuando estas tecnologias leen el h1 de la pagina, entiendad que trata la pagina por el h1. Por temas de accesibilidad web es importante que se utilice solo un h1 por pagina-->
</body>
</html>
