    <!--Los enlaces o anclas hipervinculos-->
    <!-- (anchor) significa ancla. Metafora: como un baro le mantiene una ubicacion especifica un ancla es jusamente para que el usuario sepa hacia donde busca un recurso o hacia donde navegar en la pagina web.-->

    <!--Los atributos son caracteristicas que definien el comportamiento y la apariencia ded los elemntos en este caso con el atributo hret vuelve funcional a la etiqueta es or esta razob que se utiliza en el etiquetadi y no en el css dado que no es una caracteristica visual.-->

    <!-- hret (hyper reference) es la referencia a un recurso, es decir el desino del enlace.-->
    <!--Lo que esta dentro de la etiqueta a es el texto visible que el usuario vera en la pagina web. Mientras que lo que esta dentro de href es la refencia al recurso que apunt el enlace.-->
    <h2 title="Titulo de la pagina"</h2>
    <!-- Por otra parte, el atributo tittle proporciona un texto de ayuda que se muestra cuando el usuario pasa el mouse sobre el enlace. Las tecnologias de asistencia como lectorees de pantalla utilizan este atributo para proporcionar informacion adicional al usuario. En el caso de personas invidentes esto les permite acceder a información adiicional sobre el enlace-->
