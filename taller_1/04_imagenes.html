<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imágenes</title>
    <!-- https://techicocns.dev/icons/react-->
</head>
<body>
    <!-- Etiquetas de Bloque y Etiquetas de línea-->
    <h1>Imágenes</h1>
    <!-- Las imagenes se insertan en HTML utilizando la etiqueta img. Esta etiqueta vacío, lo que significa que no tiene una etiqueta de cierre. La sintaxis basica para insertar una imagen es:-->

    <!--Vale la pena recordar que el atributo tittle proporciona un tooltip que se muestra cuando el usuario pasa el mouse sobre la imagen-->
    <img src="04_imagenWu.png" alt="Integrantes de Wutang" title="WuTangClan" width="200" height="200">
    <!-- Para que los lectores de pantalla puedan saber de que se trataba la imagen el atributo alt (alternative text) es muy importante puesto que proporciona una descripcion textual de la imagen para accesibilidad y como fallback si no se carga. El texto alternativo debe ser descriptivo y conciso, y debe transmitir la información esencial que la imagenen representa. Por ejemplo, si la imagenes es un logotipo de una empresa, el texto alternativo podria ser "Logotipo de la empresa XYZ". Si la imagen es una fotografía de un paisaje, el texto alternativo podría ser "Fotografía de un paisaje con montaña y un lago". En resumen, el atributo alt proporciona una descripción de la imagen en un caso de que no se pueda cargar-->

    <!--Self Closing Tags son etiquetas que se autocierran-->
</body>
</html>
