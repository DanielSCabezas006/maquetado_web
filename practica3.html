<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
  <h1>Titulo principal o de primero orden</h1> <!-- Encabezado más importante, se usa para el título principal de la página -->

<h2>Titulo de segundo orden</h2> <!-- Encabezado de segundo nivel, para subtítulos principales -->

<h3>Titulo de tercer orden</h3> <!-- Encabezado de tercer nivel, para secciones dentro de un h2 -->

<h4>Titulo de cuarto orden</h4> <!-- Encabezado de cuarto nivel, menos importante que h3 -->

<h5>Titulo de quinto orden </h5> <!-- Encabezado de quinto nivel, usado para detalles menores -->

<h6>Titulo de sexto orden</h6> <!-- Encabezado de menor importancia, nivel más bajo en la jerarquía -->

    
    

</body>
</html>
