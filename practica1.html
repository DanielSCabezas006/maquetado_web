<!DOCTYPE html> <!-- Indica al navegador que el documento es HTML5 -->
<html lang="en"> <!-- Elemento raíz del documento HTML y define el idioma como inglés -->
<head> <!-- Contiene metadatos e información de configuración de la página -->
    <meta charset="UTF-8"> <!-- Define la codificación de caracteres como UTF-8 (permite acentos y símbolos) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Hace que la página sea responsive en dispositivos móviles -->
    <title>Document</title> <!-- Título de la página que aparece en la pestaña del navegador -->
</head> <!-- Cierre de la sección de metadatos -->
<body> <!-- Contiene todo el contenido visible de la página -->
<!--  <!-- Inicio de un comentario en HTML -->
    -->   <!-- Fin del comentario (aunque aquí está mal estructurado porque abre dos veces) -->
</body> <!-- Cierre del cuerpo de la página -->
</html> <!-- Cierre del documento HTML -->
