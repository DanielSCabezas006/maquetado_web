<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body> <!-- El <body> es la parte del documento HTML donde se coloca todo el contenido visible en la página web -->

    <ul> <!-- <ul> significa "unordered list" (lista desordenada)
               Se usa para agrupar elementos en forma de lista con viñetas (•)
               No sigue un orden específico como números o letras -->

        <li>Elemento 1</li> <!-- <li> significa "list item" (elemento de lista)
                                 Representa cada elemento dentro de la lista -->

        <li>Elemento 2</li> <!-- Cada <li> es un ítem independiente dentro del <ul> -->

        <li>Elemento 3</li> <!-- Los elementos se muestran automáticamente con viñetas -->

    </ul> <!-- Cierre de la lista desordenada -->

    <!-- Teoría extra:
         - Existen dos tipos principales de listas en HTML:
           1. <ul> → Lista desordenada (con viñetas)
           2. <ol> → Lista ordenada (con números o letras)
         - Cada lista siempre debe contener elementos <li>
         - Las listas ayudan a organizar información de forma clara -->
 <a href="/Practica8.html">Volver al inicio</a>
</body> <!-- Fin del contenido visible -->

</html> <!-- Fin del documento HTML -->
