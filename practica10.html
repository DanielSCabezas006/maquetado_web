<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- La etiqueta table se utiliza para definir tablas en HTML. Todo el contenido de la tabla , incluidas las filas y celfas, se coloca dentro de esta eqiqueta-->

    <!--La etiqueta tr se utiliza para definir una fila en una tabla, Cada fila puede contener una o más celdas, que se definien utilizando las etiquetas td (para celdas de datos) o th (para celdas de encabezados)-->

    <!-- La etiqueta td define una celda de datos dentro de una fila. Cada etiqueta td presenta una columna en la tabla-->

    <!--La eqtiqueta th define una celda de encabezado dentro de una fila. Cada etiqueta th representa un encabezado de columna en la tabla-->

    <table border="1"> <!--Etiqueta de apertura-->
    <tr> <!--Fila 1 -->
        <th>Encabezado 1</th> <!--Celda de encabezado-->
        <th>Encabezado 2</th> <!--Celda de encabezado-->
        <td>Encabezado 3</td> <!--Celda de encabezado-->
    </tr>
    <tr> <!-- Fila 2-->
        <th>Dato 1</th> <!--Celda de datos-->
        <th>Dato 2</th> <!--Celda de datos-->
        <th>Dato 3</th> <!--Celda de datos-->
    </tr>
    <tr> <!-- Fila 3-->
        <th>Datos 4</th> <!--Celda de datos -->
        <th>Datos 5</th> <!--Celda de datos -->
        <th>Datos 6</th> <!--Celda de datos -->
    </tr>
    </table> <!--Etiqueta de cierre-->

    <br>

    <table border="1">
        <caption> Paises y Capitales</caption>
        <tr>
            <th>Pais</th>
            <th>Capital</th>
        </tr>
            <td>España</td>
            <td>Madrid</td>
        </tr>
        <tr>
            <td>Francia</td>
            <td>Paris</td>
        </tr>
        <tr>
            <td>Italia</td>
            <td>Roma</td>
        </tr>
    </table>

    <br>

    <table border="1"> <!--Tabla de celdas combinadas-->
        <tr>
            <th colspan="4"> Mundial de Futbol</th> <!-- Celdas de encabezado que abarca dos columnas-->
        </tr>
        <tr>
            <td rowspan="3"> Paises con mayoria de goles</td> <!--Celda de datos de goles-->
            <td>Brasil 2 </td> <td>230</td>
        </tr>
        <tr>
            <td>Alemania</td> <td>100</td>
        </tr>
        <tr><td>Argentina</td> <td>150</td>
        </tr>
    </table>
</body>
</html>
